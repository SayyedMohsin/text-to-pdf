<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen Studio | Pro Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@400;700&family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&family=Pacifico&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #8b3dff; --bg: #f4f5f7; --border: #d2d2d2; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* NAVBAR - Center Aligned Tools */
        .navbar { 
            height: 70px; background: white; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; z-index: 3000; position: fixed; top: 0; width: 100%;
        }
        .nav-left { font-weight: 800; font-size: 18px; color: var(--primary); text-decoration: none; flex-shrink: 0; }
        
        .nav-center-tools { 
            display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center;
            overflow-x: auto; padding: 5px 15px; -webkit-overflow-scrolling: touch;
        }
        .nav-center-tools::-webkit-scrollbar { display: none; }

        .btn-tool { 
            background: white; border: 1px solid #ddd; padding: 8px 14px; border-radius: 8px; 
            cursor: pointer; font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 6px; 
            white-space: nowrap; color: #333; flex-shrink: 0; transition: 0.2s;
        }
        .btn-tool:hover { border-color: var(--primary); color: var(--primary); background: #fcfaff; }
        .btn-purple { background: var(--primary); color: white; border: none; padding: 10px 18px; }

        /* HERO TEXT - Pushed down further to prevent overlap */
        .hero-text { 
            text-align: center; padding: 180px 10px 10px; font-weight: 800; font-size: 28px; 
            pointer-events: none; position: relative; z-index: 100; 
        }
        .hero-text span { color: var(--primary); }

        /* WORKSPACE */
        .workspace { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px 0 120px; gap: 40px; position: relative; z-index: 10; }
        .canvas-card { position: relative; background: white; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 2px solid transparent; z-index: 10; transform-origin: top center; transition: transform 0.2s; }
        .canvas-card.active-page { border-color: var(--primary); }

        /* FLOATING TOOLBAR - Scrollable on Mobile */
        #floating-toolbar {
            position: fixed; top: 75px; left: 50%; transform: translateX(-50%);
            display: none; background: white; padding: 10px 20px; border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 2500; align-items: center; gap: 10px; 
            border: 1px solid #eee; max-width: 95vw; overflow-x: auto; border-top: none;
        }
        #floating-toolbar::-webkit-scrollbar { display: none; }
        #floating-toolbar.active { display: flex; }
        
        .v-sep { width: 1px; height: 25px; background: #eee; flex-shrink: 0; }
        select, .size-input { border: 1px solid #ddd; border-radius: 6px; padding: 5px; font-weight: 600; outline: none; background: #fafafa; }

        /* ZOOM CONTROLS */
        .zoom-controls { position: fixed; bottom: 80px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .btn-zoom { width: 40px; height: 40px; border-radius: 50%; background: white; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: #333; }

        /* FOOTER */
        .project-footer { height: 55px; background: white; border-top: 1px solid #d2d2d2; display: flex; justify-content: center; align-items: center; width: 100%; z-index: 2000; position: fixed; bottom: 0; }
        .footer-content { display: flex; align-items: center; gap: 20px; font-size: 13px; color: #666; overflow-x: auto; padding: 0 15px; }
        .footer-content a { text-decoration: none; color: #1e1e1e; font-weight: 600; white-space: nowrap; }

        /* PREVIEW MODE */
        body.preview-active .navbar, body.preview-active .hero-text, body.preview-active #floating-toolbar, body.preview-active .zoom-controls { display: none !important; }
        #exit-preview { position: fixed; top: 20px; right: 20px; z-index: 5000; display: none; }
        body.preview-active #exit-preview { display: block; }

        @media (max-width: 768px) {
            .nav-left { display: none; }
            .nav-center-tools { justify-content: flex-start; }
            .hero-text { padding-top: 200px; font-size: 18px; }
            .canvas-card { transform: scale(0.42) !important; margin-bottom: -600px; }
            #floating-toolbar { top: 70px; border-radius: 12px; }
            .nav-right span { display: none; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="nav-left">NexGen Studio</a>
        <div class="nav-center-tools">
            <button class="btn-tool" onclick="addText('heading')"><i data-lucide="heading"></i> Heading</button>
            <button class="btn-tool" onclick="addText('body')"><i data-lucide="type"></i> Body</button>
            <button class="btn-tool" onclick="document.getElementById('img-upload').click()"><i data-lucide="image"></i> Upload</button>
            <input type="file" id="img-upload" hidden onchange="uploadImage(event)">
            <div class="v-sep"></div>
            <button class="btn-tool" onclick="toggleList('bullet')"><i data-lucide="list"></i> Bullet</button>
            <button class="btn-tool" onclick="toggleList('number')"><i data-lucide="list-ordered"></i> 123</button>
            <button class="btn-tool" onclick="addLine()"><i data-lucide="minus"></i> Line</button>
            <div class="v-sep"></div>
            <button class="btn-tool" onclick="addNewPage()"><i data-lucide="plus-square"></i> Page</button>
            <button class="btn-tool" onclick="toggleOrientation()"><i data-lucide="refresh-cw"></i> Rotate</button>
            <button class="btn-tool" onclick="document.getElementById('bg-input').click()"><i data-lucide="palette"></i> BG</button>
            <input type="color" id="bg-input" hidden onchange="changeBG(this.value)">
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-tool" onclick="togglePreview()"><i data-lucide="eye"></i></button>
            <button class="btn-tool btn-purple" onclick="downloadPDF()"><i data-lucide="download"></i> <span>PDF</span></button>
        </div>
    </header>

    <button id="exit-preview" class="btn-tool btn-purple" onclick="togglePreview()"><i data-lucide="eye-off"></i> Exit Preview</button>

    <div class="hero-text">Professional Design <span>Made Simple</span></div>

    <main class="workspace" id="workspace">
        <div class="zoom-controls">
            <button class="btn-zoom" onclick="changeZoom(0.1)" title="Zoom In"><i data-lucide="zoom-in"></i></button>
            <button class="btn-zoom" onclick="changeZoom(-0.1)" title="Zoom Out"><i data-lucide="zoom-out"></i></button>
            <button class="btn-zoom" onclick="resetZoom()" title="Reset Zoom"><i data-lucide="maximize"></i></button>
        </div>

        <div id="floating-toolbar">
            <div id="text-edit-tools" style="display:none; align-items:center; gap:8px;">
                <select id="font-family" onchange="updateStyle('fontFamily', this.value)" style="width:110px">
                    <option value="Arial">Arial</option>
                    <option value="Inter" selected>Inter</option>
                    <option value="Poppins">Poppins</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Pacifico">Pacifico</option>
                </select>
                <input type="number" id="font-size" class="size-input" style="width:50px" onchange="updateStyle('fontSize', this.value)">
                <input type="color" id="font-color" onchange="updateStyle('fill', this.value)">
                <div class="v-sep"></div>
                <button class="btn-tool" onclick="toggleFormat('bold')"><i data-lucide="bold" size="16"></i></button>
                <button class="btn-tool" onclick="toggleFormat('italic')"><i data-lucide="italic" size="16"></i></button>
                <button class="btn-tool" onclick="toggleFormat('underline')"><i data-lucide="underline" size="16"></i></button>
                <div class="v-sep"></div>
                <button class="btn-tool" onclick="updateStyle('textAlign', 'left')"><i data-lucide="align-left" size="16"></i></button>
                <button class="btn-tool" onclick="updateStyle('textAlign', 'center')"><i data-lucide="align-center" size="16"></i></button>
                <button class="btn-tool" onclick="updateStyle('textAlign', 'right')"><i data-lucide="align-right" size="16"></i></button>
                <button class="btn-tool" onclick="updateStyle('textAlign', 'justify')"><i data-lucide="align-justify" size="16"></i></button>
            </div>
            
            <div id="line-edit-tools" style="display:none; align-items:center; gap:8px;">
                <span>Thickness:</span>
                <input type="number" id="line-weight" class="size-input" value="2" onchange="updateStyle('height', this.value)">
            </div>

            <button class="btn-tool" id="btn-start-crop" style="display:none; color:var(--primary); font-weight:bold;" onclick="startCropMode()"><i data-lucide="crop"></i> CROP IMAGE</button>
            
            <div class="v-sep"></div>
            <button class="btn-tool" style="color:#ff4d4d;" onclick="deleteObject()"><i data-lucide="trash-2"></i></button>

            <div id="crop-actions" style="display:none; gap:10px;">
                <button class="btn-tool btn-purple" onclick="applyCrop()">Apply</button>
                <button class="btn-tool" style="background:#ff4d4d; color:white; border:none;" onclick="cancelCrop()">Cancel</button>
            </div>
        </div>

        <div class="canvas-card active-page" id="card-1">
            <canvas id="canva-1"></canvas>
        </div>
    </main>

    <footer class="project-footer">
        <div class="footer-content">
            <span>© 2026 Sayyed Mohsin Ali</span>
            <div class="v-sep"></div>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="contact.html">Contact Us</a>
            <div class="v-sep"></div>
            <a href="https://github.com/SayyedMohsin" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/sayyed-mohsin-ali-63b8032b2/" target="_blank">LinkedIn</a>
        </div>
    </footer>

<script>
    lucide.createIcons();
    let canvases = [], activeCanvas = null, cropRect = null, targetImg = null, isPreview = false, currentZoom = 1;

    function initCanvas(id) {
        const c = new fabric.Canvas(id, { width: 794, height: 1123, backgroundColor: '#fff', preserveObjectStacking: true });
        c.on('selection:created', (e) => syncToolbar(e.selected[0]));
        c.on('selection:updated', (e) => syncToolbar(e.selected[0]));
        c.on('selection:cleared', () => document.getElementById('floating-toolbar').classList.remove('active'));
        c.on('mouse:down', () => setActive(c));
        canvases.push(c);
        return c;
    }

    activeCanvas = initCanvas('canva-1');

    function setActive(c) {
        activeCanvas = c;
        document.querySelectorAll('.canvas-card').forEach(el => el.classList.remove('active-page'));
        c.lowerCanvasEl.closest('.canvas-card').classList.add('active-page');
    }

    function syncToolbar(obj) {
        if(isPreview) return;
        const tb = document.getElementById('floating-toolbar');
        tb.classList.add('active');
        document.getElementById('text-edit-tools').style.display = obj.type.includes('text') ? 'flex' : 'none';
        document.getElementById('line-edit-tools').style.display = (obj.type === 'rect' && !cropRect) ? 'flex' : 'none';
        document.getElementById('btn-start-crop').style.display = (obj.type === 'image') ? 'flex' : 'none';
        if(obj.type.includes('text')) {
            document.getElementById('font-size').value = obj.fontSize;
            document.getElementById('font-color').value = obj.fill;
        }
    }

    // --- CROP FIX ---
    function startCropMode() {
        targetImg = activeCanvas.getActiveObject();
        if(!targetImg || targetImg.type !== 'image') return;
        document.getElementById('text-edit-tools').style.display = 'none';
        document.getElementById('btn-start-crop').style.display = 'none';
        document.getElementById('crop-actions').style.display = 'flex';
        cropRect = new fabric.Rect({ left: targetImg.left, top: targetImg.top, width: targetImg.getScaledWidth()/2, height: targetImg.getScaledHeight()/2, fill: 'rgba(139, 61, 255, 0.3)', stroke: '#8b3dff', strokeDashArray: [5,5] });
        activeCanvas.add(cropRect).setActiveObject(cropRect).renderAll();
    }

    function applyCrop() {
        const sX = targetImg.scaleX, sY = targetImg.scaleY;
        const left = (cropRect.left - targetImg.left) / sX;
        const top = (cropRect.top - targetImg.top) / sY;
        const width = cropRect.getScaledWidth() / sX;
        const height = cropRect.getScaledHeight() / sY;
        targetImg.set({ cropX: targetImg.cropX + left, cropY: targetImg.cropY + top, width: width, height: height });
        cancelCrop();
    }

    function cancelCrop() { if(cropRect) activeCanvas.remove(cropRect); cropRect = null; document.getElementById('crop-actions').style.display = 'none'; activeCanvas.renderAll(); }

    // --- UTILITIES ---
    function addText(t) { activeCanvas.discardActiveObject(); const txt = new fabric.IText(t==='heading'?'Heading':'Body Text', { left: 100, top: 100, fontSize: t==='heading'?40:20, fontFamily:'Arial' }); activeCanvas.add(txt).setActiveObject(txt).renderAll(); }
    function addLine() { const line = new fabric.Rect({ left: 100, top: 150, width: 400, height: 2, fill: '#333' }); activeCanvas.add(line).setActiveObject(line); }
    function uploadImage(e) { const reader = new FileReader(); reader.onload = (f) => { fabric.Image.fromURL(f.target.result, (img) => { img.scaleToWidth(400); img.set({ left: (activeCanvas.width/2)-200, top: 50 }); activeCanvas.add(img).setActiveObject(img); }); }; if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]); e.target.value = ''; }
    function updateStyle(p, v) { const o = activeCanvas.getActiveObject(); if(o) { o.set(p, (p==='fontSize' || p==='height') ? parseInt(v) : v); activeCanvas.renderAll(); } }
    function toggleFormat(f) { const o = activeCanvas.getActiveObject(); if(o) { if(f==='bold') o.set('fontWeight', o.fontWeight==='bold'?'normal':'bold'); if(f==='italic') o.set('fontStyle', o.fontStyle==='italic'?'normal':'italic'); if(f==='underline') o.set('underline', !o.underline); activeCanvas.renderAll(); } }
    function deleteObject() { const obj = activeCanvas.getActiveObject(); if(obj) { activeCanvas.remove(obj); activeCanvas.discardActiveObject().renderAll(); } }
    function changeBG(val) { activeCanvas.setBackgroundColor(val, activeCanvas.renderAll.bind(activeCanvas)); }
    function changeZoom(val) { currentZoom = Math.min(Math.max(currentZoom + val, 0.5), 2); document.querySelectorAll('.canvas-card').forEach(card => card.style.transform = `scale(${currentZoom})`); }
    function resetZoom() { currentZoom = 1; document.querySelectorAll('.canvas-card').forEach(card => card.style.transform = `scale(1)`); }
    function togglePreview() { isPreview = !isPreview; document.body.classList.toggle('preview-active', isPreview); canvases.forEach(c => { c.discardActiveObject(); c.selection = !isPreview; c.forEachObject(o => o.selectable = !isPreview); c.renderAll(); }); }
    function toggleOrientation() { const w = activeCanvas.getWidth(); const h = activeCanvas.getHeight(); activeCanvas.setDimensions({ width: h, height: w }); activeCanvas.requestRenderAll(); }
    function downloadPDF() { const { jsPDF } = window.jspdf; const pdf = new jsPDF(canvases[0].width > canvases[0].height ? 'l' : 'p', 'mm', 'a4'); canvases.forEach((c, i) => { if(i>0) pdf.addPage('a4', c.width > c.height ? 'l' : 'p'); pdf.addImage(c.toDataURL({format:'png', multiplier:2}), 'PNG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight()); }); pdf.save('NexGen_Studio.pdf'); }
    function toggleList(type) { const obj = activeCanvas.getActiveObject(); if (!obj || !obj.text) return; let lines = obj.text.split('\n'); let newList = lines.map((line, i) => { let clean = line.replace(/^•\s|^\d+\.\s/, ''); return type === 'bullet' ? `• ${clean}` : `${i + 1}. ${clean}`; }).join('\n'); obj.set('text', newList); activeCanvas.renderAll(); }
    function addNewPage() { const id = `canva-${Date.now()}`; const card = document.createElement('div'); card.className = 'canvas-card'; card.innerHTML = `<canvas id="${id}"></canvas>`; document.getElementById('workspace').appendChild(card); setActive(initCanvas(id)); lucide.createIcons(); }
    window.addEventListener('keydown', (e) => { if((e.key === "Delete" || e.key === "Backspace") && !activeCanvas.getActiveObject()?.isEditing) deleteObject(); });
</script>
</body>
</html>
